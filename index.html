<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GDHの文档</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
</head>
<body>
  <div id="landingPage" class="landing-page">
    <div class="landing-bg"></div>
    <header class="landing-header">
      <div class="container">
        <div class="header-left">
          <a href="#" class="logo">
            <i class="fas fa-book-open"></i>
            <span>GDHの文档</span>
          </a>
        </div>
        <div class="header-right">
          <button class="palette-toggle" id="landingPaletteToggle">
            <i class="fas fa-palette"></i>
          </button>
        </div>
      </div>
    </header>
    <section class="hero">
      <div class="hero-content">
        <img src="favicon.png" alt="Logo" class="hero-logo" id="heroLogo">
        <h1 class="hero-title">
          <span class="gradient-text">GDHの文档</span>
        </h1>
        <p class="hero-subtitle">
          欢迎来到GDH的文档资源站，这里记录了许多的好东西😊
        </p>
        <div class="hero-buttons">
          <a href="#/home" class="btn btn-primary" id="docEntryBtn">
            👉 查看文档
          </a>
        </div>
      </div>
    </section>
  </div>

  <div id="app" style="display: none;">
    <div class="loading" id="loading">
      <i class="fas fa-spinner"></i>
      <p>正在加载文档...</p>
    </div>
    <header class="header">
      <div class="header-left">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        <a href="#" class="logo">
          <i class="fas fa-book-open"></i>
          <span>GDHの文档</span>
        </a>
      </div>
      <nav class="header-nav">
        <a href="#">首页</a>
      </nav>
      <div class="header-right">
        <button class="palette-toggle" id="docPaletteToggle">
          <i class="fas fa-palette"></i>
        </button>
      </div>
    </header>
    <div class="main-container">
      <aside class="sidebar">
        <div class="sidebar-search">
          <div class="sidebar-search-box">
            <i class="fas fa-search sidebar-search-icon"></i>
            <input 
              type="text" 
              class="sidebar-search-input" 
              id="sidebarSearchInput" 
              placeholder="搜索文档..." 
              autocomplete="off"
            >
            <span class="sidebar-search-shortcut">Ctrl+K</span>
          </div>
        </div>
        <ul class="sidebar-menu" id="sidebarMenu"></ul>
      </aside>
      <main class="content">
        <article class="markdown-body" id="markdownBody"></article>
      </main>
      <aside class="toc">
        <div class="toc-title">本页目录</div>
        <ul class="toc-list" id="tocList"></ul>
      </aside>
    </div>
    <div class="mask" id="mask"></div>
    <button class="back-to-top" id="backToTop">
      <i class="fas fa-arrow-up"></i>
    </button>
  </div>

  <div class="search-modal" id="searchModal">
    <div class="search-modal-mask" id="searchModalMask"></div>
    <div class="search-modal-content">
      <div class="search-modal-header">
        <i class="fas fa-search" style="color: var(--text-tertiary);"></i>
        <input 
          type="text" 
          class="search-modal-input" 
          id="searchModalInput" 
          placeholder="输入关键词搜索文档..." 
          autocomplete="off"
        >
        <button class="search-modal-close" id="searchModalClose">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="search-modal-result" id="searchModalResult"></div>
    </div>
  </div>

  <div class="palette-modal" id="paletteModal">
    <div class="palette-modal-mask" id="paletteModalMask"></div>
    <div class="palette-modal-content">
      <div class="palette-modal-header">
        <div class="palette-modal-title">
          <i class="fas fa-palette"></i>
          外观
        </div>
        <button class="palette-modal-close" id="paletteModalClose">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="palette-modal-body">
        <div class="palette-section">
          <div class="palette-section-label">
            <span>主题色</span>
            <div class="color-preview" id="colorPreview"></div>
          </div>
          <input 
            type="range" 
            min="0" 
            max="360" 
            value="217" 
            class="color-slider" 
            id="colorSlider"
          >
          <div class="color-code-display" id="colorCodeDisplay">#165DFF</div>
        </div>
        <div class="theme-switch-section">
          <div class="theme-switch-label">
            <i class="fas fa-moon" id="themeSwitchIcon"></i>
            <span>暗黑模式</span>
          </div>
          <div class="theme-switch" id="themeSwitch">
            <div class="theme-switch-thumb" id="themeSwitchThumb">
              <i class="fas fa-sun"></i>
            </div>
          </div>
        </div>
        <button class="palette-reset-btn" id="paletteResetBtn">
          恢复默认设置
        </button>
      </div>
    </div>
  </div>

  <div class="image-viewer-modal" id="imageViewerModal">
    <button class="image-viewer-close" id="imageViewerClose">
      <i class="fas fa-times"></i>
    </button>
    <div class="image-viewer-content" id="imageViewerContent">
      <img id="viewerImage" src="" alt="放大图片">
    </div>
  </div>

  <script>
    const config = {
      basePath: 'pages/',
      homePage: 'home.md',
      sidebarFile: '_sidebar.md',
      titleSuffix: ' - GDHの文档',
      loadSidebar: true,
      auto2top: true,
      defaultPrimaryColor: '#165DFF',
      defaultHue: 217
    };

    let currentPath = '';
    let headings = [];
    let sidebarData = [];
    let searchCache = {};
    let searchDebounceTimer = null;
    let currentHue = config.defaultHue;
    let currentColor = config.defaultPrimaryColor;

    const landingPage = document.getElementById('landingPage');
    const app = document.getElementById('app');
    const loading = document.getElementById('loading');
    const docEntryBtn = document.getElementById('docEntryBtn');
    const imageViewerModal = document.getElementById('imageViewerModal');
    const viewerImage = document.getElementById('viewerImage');
    const imageViewerClose = document.getElementById('imageViewerClose');
    const sidebarMenu = document.getElementById('sidebarMenu');
    const markdownBody = document.getElementById('markdownBody');
    const tocList = document.getElementById('tocList');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.querySelector('.sidebar');
    const mask = document.getElementById('mask');
    const backToTop = document.getElementById('backToTop');
    const heroLogo = document.getElementById('heroLogo');
    const paletteModal = document.getElementById('paletteModal');
    const paletteModalMask = document.getElementById('paletteModalMask');
    const paletteModalClose = document.getElementById('paletteModalClose');
    const landingPaletteToggle = document.getElementById('landingPaletteToggle');
    const docPaletteToggle = document.getElementById('docPaletteToggle');
    const colorSlider = document.getElementById('colorSlider');
    const colorPreview = document.getElementById('colorPreview');
    const colorCodeDisplay = document.getElementById('colorCodeDisplay');
    const paletteResetBtn = document.getElementById('paletteResetBtn');
    const themeSwitch = document.getElementById('themeSwitch');
    const themeSwitchThumb = document.getElementById('themeSwitchThumb');
    const themeSwitchIcon = document.getElementById('themeSwitchIcon');
    const searchModal = document.getElementById('searchModal');
    const searchModalInput = document.getElementById('searchModalInput');
    const searchModalResult = document.getElementById('searchModalResult');
    const searchModalClose = document.getElementById('searchModalClose');
    const searchModalMask = document.getElementById('searchModalMask');
    const sidebarSearchInput = document.getElementById('sidebarSearchInput');

    function openImageViewer(src) {
      viewerImage.src = src;
      imageViewerModal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeImageViewer() {
      imageViewerModal.classList.remove('show');
      viewerImage.src = '';
      document.body.style.overflow = '';
    }

    function bindImageViewerEvents() {
      imageViewerClose.addEventListener('click', closeImageViewer);
      imageViewerModal.addEventListener('click', (e) => {
        if (e.target === imageViewerModal) closeImageViewer();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && imageViewerModal.classList.contains('show')) {
          closeImageViewer();
        }
      });
    }

    function togglePage() {
      const hash = window.location.hash;
      if (!hash || hash === '#') {
        landingPage.style.display = 'block';
        app.style.display = 'none';
        document.title = 'GDHの文档';
      } else {
        landingPage.style.display = 'none';
        app.style.display = 'block';
        loading.style.display = 'block';
      }
    }

    function hslToHex(h, s, l) {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function updatePrimaryColor(hue) {
      currentHue = hue;
      const color = hslToHex(hue, 100, 55);
      currentColor = color;
      
      document.documentElement.style.setProperty('--primary-color', color);
      const hoverColor = hslToHex(hue, 100, 65);
      document.documentElement.style.setProperty('--primary-hover', hoverColor);
      
      colorCodeDisplay.textContent = color;
      colorSlider.value = hue;
      
      localStorage.setItem('docs-primary-hue', hue);
      localStorage.setItem('docs-primary-color', color);
    }

    function openPaletteModal() {
      paletteModal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closePaletteModal() {
      paletteModal.classList.remove('show');
      document.body.style.overflow = '';
    }

    function resetPalette() {
      updatePrimaryColor(config.defaultHue);
      setTheme('light');
    }

    function initTheme() {
      const savedHue = localStorage.getItem('docs-primary-hue');
      if (savedHue) {
        updatePrimaryColor(parseInt(savedHue));
      } else {
        updatePrimaryColor(config.defaultHue);
      }

      const savedTheme = localStorage.getItem('docs-theme') || 'light';
      setTheme(savedTheme);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const isDark = theme === 'dark';
      
      themeSwitch.classList.toggle('active', isDark);
      themeSwitchThumb.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
      themeSwitchIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      
      localStorage.setItem('docs-theme', theme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }

    function bindPaletteEvents() {
      landingPaletteToggle.addEventListener('click', openPaletteModal);
      docPaletteToggle.addEventListener('click', openPaletteModal);
      
      paletteModalClose.addEventListener('click', closePaletteModal);
      paletteModalMask.addEventListener('click', closePaletteModal);
      
      colorSlider.addEventListener('input', (e) => {
        updatePrimaryColor(parseInt(e.target.value));
      });
      
      paletteResetBtn.addEventListener('click', resetPalette);
      
      themeSwitch.addEventListener('click', toggleTheme);
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && paletteModal.classList.contains('show')) {
          closePaletteModal();
        }
      });
    }

    function openSearchModal(defaultKeyword = '') {
      searchModal.classList.add('show');
      searchModalInput.value = defaultKeyword;
      searchModalInput.focus();
      if (defaultKeyword) {
        handleSearch(defaultKeyword);
      }
      document.body.style.overflow = 'hidden';
    }

    function closeSearchModal() {
      searchModal.classList.remove('show');
      searchModalInput.value = '';
      searchModalResult.innerHTML = '';
      document.body.style.overflow = '';
    }

    function highlightKeyword(text, keyword) {
      if (!keyword) return text;
      const regex = new RegExp(`(${keyword})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function handleSearch(keyword) {
      keyword = keyword.trim().toLowerCase();
      searchModalResult.innerHTML = '';

      if (!keyword) {
        searchModalResult.innerHTML = '<div class="search-result-empty">请输入关键词搜索</div>';
        return;
      }

      const resultGroups = {};
      let hasResult = false;

      Object.keys(searchCache).forEach(path => {
        const doc = searchCache[path];
        const title = doc.title;
        const content = doc.content;
        const results = [];

        if (title.toLowerCase().includes(keyword)) {
          results.push({
            type: 'title',
            title: title,
            content: '',
            anchor: ''
          });
          hasResult = true;
        }

        const lines = content.split('\n');
        lines.forEach((line) => {
          if (line.toLowerCase().includes(keyword)) {
            if (line.startsWith('#')) return;
            
            const lineLower = line.toLowerCase();
            const keywordIndex = lineLower.indexOf(keyword);
            const start = Math.max(0, keywordIndex - 30);
            const end = Math.min(line.length, keywordIndex + keyword.length + 30);
            const snippet = (start > 0 ? '...' : '') + line.slice(start, end) + (end < line.length ? '...' : '');

            results.push({
              type: 'content',
              title: title,
              content: snippet,
              anchor: ''
            });
            hasResult = true;
          }
        });

        const headingMatches = content.match(/#{1,6}\s+.+/g);
        if (headingMatches) {
          headingMatches.forEach(heading => {
            const headingText = heading.replace(/^#{1,6}\s+/, '');
            if (headingText.toLowerCase().includes(keyword)) {
              const id = headingText.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '');
              results.push({
                type: 'heading',
                title: title,
                content: headingText,
                anchor: id
              });
              hasResult = true;
            }
          });
        }

        if (results.length > 0) {
          resultGroups[path] = {
            title: title,
            path: path,
            results: results
          };
        }
      });

      if (!hasResult) {
        searchModalResult.innerHTML = `<div class="search-result-empty">未找到与「${keyword}」相关的内容</div>`;
        return;
      }

      let html = '';
      Object.values(resultGroups).forEach(group => {
        html += `<div class="search-result-group">
          <div class="search-result-title">${group.title}</div>
        `;

        group.results.forEach(result => {
          const href = group.path ? `#/${group.path}` : '#/';
          const fullHref = result.anchor ? `${href}#${result.anchor}` : href;
          
          html += `<div class="search-result-item" data-href="${fullHref}">
            <div class="result-item-title">${highlightKeyword(result.title, keyword)}</div>
            ${result.content ? `<div class="result-item-content">${highlightKeyword(result.content, keyword)}</div>` : ''}
          </div>`;
        });

        html += `</div>`;
      });

      searchModalResult.innerHTML = html;

      document.querySelectorAll('.search-result-item').forEach(item => {
        item.addEventListener('click', () => {
          const href = item.getAttribute('data-href');
          window.location.hash = href;
          closeSearchModal();
        });
      });
    }

    function debounceSearch(keyword) {
      clearTimeout(searchDebounceTimer);
      searchDebounceTimer = setTimeout(() => {
        handleSearch(keyword);
      }, 200);
    }

    function bindSearchEvents() {
      sidebarSearchInput.addEventListener('focus', () => openSearchModal());
      
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          openSearchModal();
        }
        if (e.key === 'Escape' && searchModal.classList.contains('show')) {
          closeSearchModal();
        }
      });

      searchModalInput.addEventListener('input', (e) => {
        debounceSearch(e.target.value);
      });

      searchModalClose.addEventListener('click', closeSearchModal);
      searchModalMask.addEventListener('click', closeSearchModal);

      searchModalInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          handleSearch(e.target.value);
        }
      });
    }

    marked.setOptions({
      gfm: true,
      breaks: true,
      mangle: false,
      headerIds: true,
      highlight: (code, lang) => {
        if (lang && Prism.languages[lang]) {
          return Prism.highlight(code, Prism.languages[lang], lang);
        }
        return Prism.highlight(code, Prism.languages.markup, 'markup');
      }
    });

    const renderer = new marked.Renderer();
    renderer.image = (href, title, text) => {
      if (!href.startsWith('http') && !href.startsWith('/') && !href.startsWith('data:')) {
        const pathParts = currentPath.split('/');
        pathParts.pop();
        const basePath = pathParts.join('/');
        href = basePath ? `${config.basePath}${basePath}/${href}` : `${config.basePath}${href}`;
      }
      return `<img src="${href}" alt="${text}" title="${title || ''}" onclick="openImageViewer('${href}')">`;
    };

    renderer.link = (href, title, text) => {
      if (href.startsWith('http') || href.startsWith('#') || href.startsWith('mailto:')) {
        return `<a href="${href}" title="${title || ''}" target="_blank" rel="noopener noreferrer">${text}</a>`;
      }
      href = href.replace(/\.md$/, '');
      if (href.startsWith('./') || href.startsWith('../')) {
        const baseParts = currentPath.split('/');
        baseParts.pop();
        const basePath = baseParts.join('/');
        const fullPath = new URL(href, `http://localhost/${basePath}/`).pathname.slice(1);
        href = `#/${fullPath}`;
      } else if (href.startsWith('/')) {
        href = `#${href}`;
      } else {
        href = `#/${href}`;
      }
      return `<a href="${href}" title="${title || ''}">${text}</a>`;
    };

    renderer.heading = (text, level, raw) => {
      const id = raw.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '');
      headings.push({ id, text, level });
      return `<h${level} id="${id}">${text}</h${level}>`;
    };

    marked.use({ renderer });

    function toggleSidebar() {
      sidebar.classList.toggle('show');
      mask.classList.toggle('show');
      document.body.style.overflow = sidebar.classList.contains('show') ? 'hidden' : '';
    }

    function bindSubmenuEvents() {
      document.querySelectorAll('.sidebar-menu a.has-submenu').forEach(menuItem => {
        menuItem.addEventListener('click', (e) => {
          e.preventDefault();
          const submenu = menuItem.nextElementSibling;
          
          if (submenu && submenu.classList.contains('submenu')) {
            const isActive = submenu.classList.contains('active');
            document.querySelectorAll('.sidebar-menu .submenu.active').forEach(activeSubmenu => {
              if (activeSubmenu !== submenu) {
                activeSubmenu.classList.remove('active');
                activeSubmenu.previousElementSibling.classList.remove('active');
              }
            });
            
            if (isActive) {
              submenu.classList.remove('active');
              menuItem.classList.remove('active');
            } else {
              submenu.classList.add('active');
              menuItem.classList.add('active');
            }
          }
        });
      });
    }

    async function loadSidebar() {
      try {
        const res = await fetch(config.sidebarFile);
        if (!res.ok) throw new Error('侧边栏文件不存在');
        const md = await res.text();
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(marked.parse(md), 'text/html');
        const rootUl = doc.querySelector('ul');
        
        if (!rootUl) {
          sidebarMenu.innerHTML = `<li style="padding: 20px; text-align: center; color: var(--text-tertiary);">侧边栏无内容</li>`;
          return;
        }

        sidebarMenu.innerHTML = parseSidebarList(rootUl, 0);
        cacheSidebarData();
        bindSubmenuEvents();
        preloadAllDocs();
      } catch (err) {
        console.error('侧边栏加载失败', err);
        sidebarMenu.innerHTML = `<li style="padding: 20px; text-align: center; color: var(--text-tertiary);">请在根目录创建 _sidebar.md 文件</li>`;
      }
    }

    function parseSidebarList(ulElement, level) {
      let html = '';
      const items = ulElement.querySelectorAll(':scope > li');
      
      items.forEach(li => {
        const link = li.querySelector(':scope > a');
        const subUl = li.querySelector(':scope > ul');

        if (link) {
          const href = link.getAttribute('href') || '#';
          const text = link.textContent.trim();
          const hasSubmenu = subUl ? 'has-submenu' : '';

          if (subUl) {
            if (level === 0 && (href === '#' || href === '')) {
              html += `<li class="menu-group">
                <div class="group-title">${text}</div>
                <ul class="submenu">
                  ${parseSidebarList(subUl, level + 1)}
                </ul>
              </li>`;
            } else {
              html += `<li>
                <a href="${href}" class="sidebar-link ${hasSubmenu}">${text}</a>
                <ul class="submenu">
                  ${parseSidebarList(subUl, level + 1)}
                </ul>
              </li>`;
            }
          } else {
            html += `<li><a href="${href}" class="sidebar-link">${text}</a></li>`;
          }
        }
      });

      return html;
    }

    function cacheSidebarData() {
      const links = document.querySelectorAll('.sidebar-link');
      sidebarData = Array.from(links).map(link => ({
        href: link.getAttribute('href'),
        text: link.textContent,
        path: link.getAttribute('href').replace('#/', '').replace(/\/$/, '')
      }));
    }

    async function preloadAllDocs() {
      for (const item of sidebarData) {
        if (!searchCache[item.path]) {
          try {
            const filePath = item.path ? `${item.path}.md` : config.homePage;
            const fullPath = config.basePath + filePath;
            const res = await fetch(fullPath);
            if (res.ok) {
              const md = await res.text();
              searchCache[item.path] = {
                title: item.text,
                content: md
              };
            }
          } catch (err) {
            console.warn(`预加载文档失败: ${item.path}`, err);
          }
        }
      }
    }

    function highlightActiveSidebar() {
      const links = document.querySelectorAll('.sidebar-link');
      const currentHash = window.location.hash;
      links.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === currentHash) {
          link.classList.add('active');
          let parentSubmenu = link.closest('.submenu');
          while (parentSubmenu) {
            parentSubmenu.classList.add('active');
            const parentLink = parentSubmenu.previousElementSibling;
            if (parentLink && parentLink.classList.contains('has-submenu')) {
              parentLink.classList.add('active');
            }
            parentSubmenu = parentSubmenu.parentElement.closest('.submenu');
          }
        }
      });
    }

    async function loadMarkdown() {
      let hash = window.location.hash.slice(1);
      if (!hash || hash === '/') {
        currentPath = '';
        var filePath = config.homePage;
      } else {
        const [pathPart, anchorPart] = hash.split('#');
        currentPath = pathPart.replace(/^\//, '');
        filePath = currentPath.endsWith('/') ? currentPath + 'home.md' : currentPath + '.md';
      }

      try {
        const fullPath = config.basePath + filePath;
        const res = await fetch(fullPath);
        if (!res.ok) throw new Error('文档不存在');
        
        const md = await res.text();
        headings = [];
        const html = marked.parse(md);
        markdownBody.innerHTML = html;

        updatePageTitle();
        generateTOC();
        highlightActiveSidebar();
        Prism.highlightAll();
        
        if (config.auto2top && !hash.includes('#')) {
          window.scrollTo(0, 0);
        }

        if (hash.includes('#')) {
          const anchor = hash.split('#')[1];
          const element = document.getElementById(anchor);
          if (element) {
            setTimeout(() => {
              element.scrollIntoView({ behavior: 'smooth' });
            }, 100);
          }
        }

        searchCache[currentPath] = {
          title: document.title.replace(config.titleSuffix, ''),
          content: md
        };
      } catch (err) {
        console.error(err);
        markdownBody.innerHTML = `
          <div class="not-found">
            <h1>404</h1>
            <p>文档不存在或加载失败</p>
            <a href="#/home" class="btn btn-primary">返回首页</a>
          </div>
        `;
        tocList.innerHTML = '';
        document.title = `404${config.titleSuffix}`;
      } finally {
        loading.style.display = 'none';
      }
    }

    function updatePageTitle() {
      const firstH1 = markdownBody.querySelector('h1');
      document.title = firstH1 ? `${firstH1.textContent}${config.titleSuffix}` : `GDHの文档${config.titleSuffix}`;
    }

    function generateTOC() {
      if (headings.length === 0) {
        tocList.innerHTML = '<li class="toc-item"><span class="toc-link">暂无目录</span></li>';
        return;
      }
      let html = '';
      headings.forEach(heading => {
        if (heading.level >= 2 && heading.level <= 4) {
          html += `<li class="toc-item">
            <a href="#${heading.id}" class="toc-link level-${heading.level}" data-id="${heading.id}">${heading.text}</a>
          </li>`;
        }
      });
      tocList.innerHTML = html;
      bindTOCClick();
    }

    function bindTOCClick() {
      document.querySelectorAll('.toc-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const id = link.getAttribute('data-id');
          document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
        });
      });
    }

    function highlightActiveTOC() {
      const scrollTop = window.scrollY;
      const links = document.querySelectorAll('.toc-link');
      let activeId = null;
      headings.forEach(heading => {
        const element = document.getElementById(heading.id);
        if (element && scrollTop >= element.offsetTop - 100) {
          activeId = heading.id;
        }
      });
      links.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('data-id') === activeId) link.classList.add('active');
      });
    }

    function bindEvents() {
      docEntryBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.hash = '#/home';
        togglePage();
        loadMarkdown();
      });

      window.addEventListener('hashchange', () => {
        togglePage();
        loadMarkdown();
      });

      window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        backToTop.classList.toggle('show', scrollTop > 300);
        highlightActiveTOC();
      });

      menuToggle.addEventListener('click', toggleSidebar);
      mask.addEventListener('click', toggleSidebar);
      backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('sidebar-link') && !e.target.classList.contains('has-submenu') && window.innerWidth <= 768) {
          toggleSidebar();
        }
      });

      heroLogo.addEventListener('error', () => {
        heroLogo.src = `https://ui-avatars.com/api/?name=GDH&size=200&background=165DFF&color=fff&bold=true`;
      });

      bindImageViewerEvents();
      bindSearchEvents();
      bindPaletteEvents();
    }

    async function init() {
      initTheme();
      bindEvents();
      togglePage();
      
      if (config.loadSidebar) {
        await loadSidebar();
      }
      
      if (window.location.hash) {
        loadMarkdown();
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
